<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - BetPro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111a2e;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: #4ade80;
      font-weight: bold;
      font-size: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 80vh;
    }

    .card {
      background: #111a2e;
      padding: 30px;
      border-radius: 10px;
      border: 1px solid #1f2a44;
      width: 350px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .btn {
      width: 100%;
      background: #4ade80;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    nav a {
      color: #cbd5e1;
      margin-left: 10px;
      text-decoration: none;
    }

    nav a:hover {
      color: white;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">BetPro</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>Login</h2>

    <input type="text" placeholder="Email or Phone">
    <input type="password" placeholder="Password">

    <button class="btn">Login</button>
  </div>

</div>

</body>
</html>
