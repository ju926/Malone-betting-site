<!DOCTYPE html>
<html>
<head>
  <title>Sports</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); padding:20px; gap:15px; }
    .card { background:#111a2e; padding:20px; border-radius:10px; text-align:center; }
  </style>
</head>
<body>

<h2 style="padding:20px;">Sports</h2>

<div class="grid">
  <div class="card">Football</div>
  <div class="card">Basketball</div>
  <div class="card">Tennis</div>
</div>

</body>
</html>
