<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Betting Platform</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav button {
      background: #1f2937;
      border: none;
      color: white;
      padding: 8px 12px;
      margin-right: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    nav button:hover {
      background: #374151;
    }

    main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    button.odd {
      margin-left: 5px;
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    button.odd:hover {
      background: #475569;
    }

    .game-card {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    aside {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
    }

    .bet-item {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }

    .remove {
      margin-top: 5px;
      background: red;
      border: none;
      padding: 5px;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h2>BetPro</h2>

  <nav>
    <button onclick="showSection('sports')">Sports</button>
    <button onclick="showSection('games')">Games</button>
    <button onclick="showSection('wallet')">Wallet</button>
  </nav>
</header>

<main>

  <!-- SPORTS -->
  <section id="sports">

    <h2>Live Matches</h2>

    <div class="card">
      Arsenal vs Chelsea <br><br>

      <button class="odd" onclick="addBet('Arsenal vs Chelsea','Arsenal Win',2.1)">1</button>
      <button class="odd" onclick="addBet('Arsenal vs Chelsea','Draw',3.2)">X</button>
      <button class="odd" onclick="addBet('Arsenal vs Chelsea','Chelsea Win',3.5)">2</button>
    </div>

    <div class="card">
      Real Madrid vs Barcelona <br><br>

      <button class="odd" onclick="addBet('Real vs Barca','Real Win',2.0)">1</button>
      <button class="odd" onclick="addBet('Real vs Barca','Draw',3.4)">X</button>
      <button class="odd" onclick="addBet('Real vs Barca','Barca Win',3.1)">2</button>
    </div>

  </section>

  <!-- GAMES (SAFE DEMO) -->
  <section id="games" class="hidden">

    <h2>Games</h2>

    <div class="game-card">
      Crash Simulator (Demo)
      <button onclick="playGame()">Play</button>
    </div>

    <div class="game-card">
      Spin Wheel (Demo)
      <button onclick="playGame()">Play</button>
    </div>

  </section>

  <!-- WALLET -->
  <section id="wallet" class="hidden">
    <h2>Wallet</h2>
    <p>Balance: $0 (Demo Mode)</p>
  </section>

  <!-- BET SLIP -->
  <aside>
    <h3>Bet Slip</h3>
    <div id="bets">No bets selected</div>
  </aside>

</main>

<script>
  const bets = [];

  function addBet(match, selection, odd) {
    bets.push({ match, selection, odd });
    renderBets();
  }

  function renderBets() {
    const box = document.getElementById("bets");
    box.innerHTML = "";

    if (bets.length === 0) {
      box.innerHTML = "No bets selected";
      return;
    }

    bets.forEach((b, i) => {
      const div = document.createElement("div");
      div.className = "bet-item";

      div.innerHTML = `
        <strong>${b.match}</strong><br/>
        Pick: ${b.selection}<br/>
        Odd: ${b.odd}
        <br/>
        <button class="remove" onclick="removeBet(${i})">Remove</button>
      `;

      box.appendChild(div);
    });
  }

  function removeBet(index) {
    bets.splice(index, 1);
    renderBets();
  }

  function playGame() {
    alert("Demo game (no real money system yet)");
  }

  function showSection(section) {
    document.getElementById("sports").classList.add("hidden");
    document.getElementById("games").classList.add("hidden");
    document.getElementById("wallet").classList.add("hidden");

    document.getElementById(section).classList.remove("hidden");
  }
</script>

</body>
</html>
