<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BetPro Sportsbook</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">BetPro</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Live</a>
      <a href="#">Sports</a>
      <a href="#">My Bets</a>
    </nav>
    <button class="login-btn">Login</button>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Bet Smarter. Win Bigger.</h1>
    <p>Live odds • Instant payouts • Secure betting platform</p>
    <button class="cta">Start Betting</button>
  </section>

  <!-- MATCHES -->
  <section class="container">
    <h2 class="section-title">Live Matches</h2>

    <div class="grid">

      <div class="card">
        <h3>Arsenal vs Chelsea</h3>
        <div class="odds">
          <button>1 <span>1.85</span></button>
          <button>X <span>3.20</span></button>
          <button>2 <span>4.10</span></button>
        </div>
      </div>

      <div class="card">
        <h3>Real Madrid vs Barcelona</h3>
        <div class="odds">
          <button>1 <span>2.10</span></button>
          <button>X <span>3.40</span></button>
          <button>2 <span>3.00</span></button>
        </div>
      </div>

      <div class="card">
        <h3>Man City vs Liverpool</h3>
        <div class="odds">
          <button>1 <span>1.95</span></button>
          <button>X <span>3.50</span></button>
          <button>2 <span>3.80</span></button>
        </div>
      </div>

    </div>
  </section>

  <!-- BET SLIP -->
  <aside class="betslip">
    <h3>Bet Slip</h3>
    <p>No selections yet</p>
    <button class="place-bet">Place Bet</button>
  </aside>

</body>
</html>
