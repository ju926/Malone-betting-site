<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BetPro - Sports Betting Platform</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav button {
      background: #1f2937;
      border: none;
      color: white;
      padding: 8px 12px;
      margin-right: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    nav button:hover {
      background: #374151;
    }

    main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    section {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .match button {
      margin-left: 5px;
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .match button:hover {
      background: #475569;
    }

    .game-card {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    aside {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      height: fit-content;
    }

    .bet-item {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h2>BetPro</h2>

  <nav>
    <button onclick="showSection('sports')">Sports</button>
    <button onclick="showSection('games')">Games</button>
    <button onclick="showSection('wallet')">Wallet</button>
  </nav>
</header>

<main>

  <!-- SPORTS -->
  <section id="sports">

    <h2>Live Matches</h2>

    <div class="card match">
      Arsenal vs Chelsea
      <button onclick="addBet('Arsenal Win')">1</button>
      <button onclick="addBet('Draw')">X</button>
      <button onclick="addBet('Chelsea Win')">2</button>
    </div>

    <div class="card match">
      Real Madrid vs Barcelona
      <button onclick="addBet('Real Win')">1</button>
      <button onclick="addBet('Draw')">X</button>
      <button onclick="addBet('Barca Win')">2</button>
    </div>

  </section>

  <!-- GAMES (SAFE SIMULATION) -->
  <section id="games" class="hidden">

    <h2>Games</h2>

    <div class="game-card">
      🎮 Crash Simulator (Demo)
      <button onclick="playGame()">Play</button>
    </div>

    <div class="game-card">
      🎡 Spin Wheel (Demo)
      <button onclick="playGame()">Play</button>
    </div>

  </section>

  <!-- WALLET -->
  <section id="wallet" class="hidden">

    <h2>Wallet</h2>
    <p>Balance: $0 (Demo)</p>

  </section>

  <!-- BET SLIP -->
  <aside>
    <h3>Bet Slip</h3>
    <div id="bets">No bets selected</div>
  </aside>

</main>

<script>
  const bets = [];

  function addBet(bet) {
    bets.push(bet);
    renderBets();
  }

  function renderBets() {
    const box = document.getElementById("bets");
    box.innerHTML = "";

    bets.forEach((b, i) => {
      const div = document.createElement("div");
      div.className = "bet-item";
      div.innerText = b;
      box.appendChild(div);
    });
  }

  function playGame() {
    alert("Demo game launched (no real betting yet)");
  }

  function showSection(section) {
    document.getElementById("sports").classList.add("hidden");
    document.getElementById("games").classList.add("hidden");
    document.getElementById("wallet").classList.add("hidden");

    document.getElementById(section).classList.remove("hidden");
  }
</script>

</body>
</html>
