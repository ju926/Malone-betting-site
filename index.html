<!DOCTYPE html>
<html>
<head>
  <title>Betting Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="topbar">
  <h1>⚽ BetHub</h1>
  <div class="balance">Balance: KES 0.00</div>
</header>

<div class="container">

  <!-- LEFT: Matches -->
  <section class="matches">

    <h2>Live Matches</h2>

    <div class="card">
      <div class="teams">Arsenal vs Chelsea</div>
      <div class="odds">
        <button>1 2.10</button>
        <button>X 3.20</button>
        <button>2 3.10</button>
      </div>
    </div>

    <div class="card">
      <div class="teams">Real Madrid vs Barcelona</div>
      <div class="odds">
        <button>1 2.40</button>
        <button>X 3.50</button>
        <button>2 2.60</button>
      </div>
    </div>

  </section>

  <!-- RIGHT: Bet Slip -->
  <aside class="betslip">
    <h2>Bet Slip</h2>
    <div id="slip">
      <p>No selections yet</p>
    </div>

    <button class="place-bet">Place Bet</button>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
