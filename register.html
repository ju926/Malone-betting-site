<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; }
    .box { max-width:350px; margin:80px auto; background:#111a2e; padding:25px; border-radius:10px; }
    input { width:100%; padding:10px; margin:10px 0; border:none; border-radius:6px; }
    .btn { width:100%; background:#4ade80; padding:10px; border:none; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>

<div class="box">
  <h2>Register</h2>
  <input placeholder="Name">
  <input placeholder="Email">
  <input type="password" placeholder="Password">
  <button class="btn">Create Account</button>
</div>

</body>
</html>
